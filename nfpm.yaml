# nfpm configuration — generates deb and rpm from a staged install.
# This file is a template; build.sh substitutes __VERSION__ and __ARCH__ at build time.
#
# Usage (via build.sh):
#   ./build.sh pkg          # build deb + rpm for current platform
#   ./build.sh ci           # build wheels + deb + rpm

name: lograph
arch: __ARCH__
version: __VERSION__
maintainer: Log Graph Analyzer contributors
description: |
  Log Graph Analyzer — high-performance log analysis tool with
  compressed storage, Git-like history DAG, reversible operations,
  streaming engine, and Python CLI. Designed for files >10GB.
vendor: log-graph-analyzer
homepage: https://github.com/log-analyzer/log-analyzer
license: MIT

depends:
  - python3 >= 3.10

contents:
  # The self-contained virtualenv
  - src: __STAGING__/opt/lograph/
    dst: /opt/lograph/
    type: tree

  # CLI entry point wrapper
  - src: __STAGING__/usr/bin/lograph-cli
    dst: /usr/bin/lograph-cli

  # TUI binary
  - src: __STAGING__/usr/bin/lograph
    dst: /usr/bin/lograph

scripts:
  postinstall: "__STAGING__/postinstall.sh"
  preremove: ""
