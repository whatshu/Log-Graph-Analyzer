name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── TUI binary: Linux (musl — static, portable) ──────────────────
  build-linux-musl:
    name: TUI ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          # aarch64 musl needs cross-compiler
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-musl" ]]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
          fi

      - name: Build TUI binary (musl)
        run: cargo build --bin la --no-default-features --release --target ${{ matrix.target }}

      - name: Package (tar.gz)
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf la-${{ matrix.target }}.tar.gz la
          sha256sum la-${{ matrix.target }}.tar.gz > la-${{ matrix.target }}.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: la-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/la-*.tar.gz
            target/${{ matrix.target }}/release/la-*.tar.gz.sha256

  # ── TUI binary: Linux GNU (ubuntu-22.04, glibc ≥ 2.35) ─────────
  build-linux-gnu:
    name: TUI ${{ matrix.target }} (glibc)
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation deps
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build TUI binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --bin la --no-default-features --release --target ${{ matrix.target }}

      - name: Check minimum glibc version
        shell: bash
        run: |
          echo "=== Required GLIBC symbols (max version) ==="
          objdump -T target/${{ matrix.target }}/release/la \
            | grep -oP 'GLIBC_\K[0-9]+\.[0-9]+' \
            | sort -Vru \
            | head -5 \
            || echo "(unable to determine — possibly static)"
          echo ""
          echo "=== Binary file info ==="
          file target/${{ matrix.target }}/release/la

      - name: Package (tar.gz)
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf la-${{ matrix.target }}.tar.gz la
          sha256sum la-${{ matrix.target }}.tar.gz > la-${{ matrix.target }}.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: la-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/la-*.tar.gz
            target/${{ matrix.target }}/release/la-*.tar.gz.sha256

  # ── TUI binary: Linux GNU via Docker (AlmaLinux 8, glibc ≥ 2.28) ─
  # Produces a binary compatible with RHEL 8+, Debian 10+, Ubuntu 20.04+
  build-linux-gnu-legacy:
    name: TUI x86_64-gnu (glibc ≥ 2.28, Docker)
    runs-on: ubuntu-latest
    container:
      image: almalinux:8
    steps:
      - name: Install build dependencies
        run: |
          dnf install -y --setopt=install_weak_deps=False \
            gcc gcc-c++ make curl git \
            perl-IPC-Cmd perl-Data-Dumper perl-FindBin

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/checkout@v4

      - name: Build TUI binary
        run: cargo build --bin la --no-default-features --release

      - name: Check minimum glibc version
        shell: bash
        run: |
          echo "=== Required GLIBC symbols (max version) ==="
          objdump -T target/release/la \
            | grep -oP 'GLIBC_\K[0-9]+\.[0-9]+' \
            | sort -Vru \
            | head -5 \
            || echo "(unable to determine)"
          echo ""
          echo "=== Binary file info ==="
          file target/release/la

      - name: Package (tar.gz)
        shell: bash
        run: |
          cd target/release
          tar czf la-x86_64-unknown-linux-gnu-legacy.tar.gz la
          sha256sum la-x86_64-unknown-linux-gnu-legacy.tar.gz > la-x86_64-unknown-linux-gnu-legacy.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: la-x86_64-unknown-linux-gnu-legacy
          path: |
            target/release/la-*-legacy.tar.gz
            target/release/la-*-legacy.tar.gz.sha256

  # ── TUI binary: macOS ────────────────────────────────────────────
  build-macos-tui:
    name: TUI ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-13
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build TUI binary
        run: cargo build --bin la --no-default-features --release --target ${{ matrix.target }}

      - name: Package (tar.gz)
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf la-${{ matrix.target }}.tar.gz la
          sha256sum la-${{ matrix.target }}.tar.gz > la-${{ matrix.target }}.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: la-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/la-*.tar.gz
            target/${{ matrix.target }}/release/la-*.tar.gz.sha256

  # ── TUI binary: Windows ──────────────────────────────────────────
  build-windows-tui:
    name: TUI x86_64-pc-windows-msvc
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build TUI binary
        run: cargo build --bin la --no-default-features --release

      - name: Package (zip)
        shell: pwsh
        run: |
          $dst = "la-x86_64-pc-windows-msvc.zip"
          Compress-Archive -Path target/release/la.exe -DestinationPath $dst
          (Get-FileHash $dst -Algorithm SHA256).Hash + "  " + $dst | Out-File -Encoding ascii "$dst.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: la-x86_64-pc-windows-msvc
          path: |
            la-x86_64-pc-windows-msvc.zip
            la-x86_64-pc-windows-msvc.zip.sha256

  # ── Python wheels (all platforms) ────────────────────────────────
  build-wheels:
    name: Wheel (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          args: --release --features python-bindings --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*.whl

  # ── System packages: deb + rpm (Linux only) ─────────────────────
  build-linux-pkg:
    name: deb + rpm (x86_64)
    needs: [build-linux-musl]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Python wheel
        uses: PyO3/maturin-action@v1
        with:
          args: --release --features python-bindings --out dist

      - name: Download TUI binary (musl — portable)
        uses: actions/download-artifact@v4
        with:
          name: la-x86_64-unknown-linux-musl

      - name: Extract TUI binary
        run: |
          tar xzf la-x86_64-unknown-linux-musl.tar.gz
          mkdir -p target/release
          cp la target/release/la
          chmod +x target/release/la

      - name: Install nfpm
        run: |
          curl -fsSL https://github.com/goreleaser/nfpm/releases/download/v2.41.1/nfpm_2.41.1_linux_x86_64.tar.gz | tar xz -C /usr/local/bin nfpm

      - name: Build deb + rpm
        run: |
          WHEEL=$(ls dist/*.whl | head -1)
          STAGING=$(mktemp -d)
          VENV="$STAGING/opt/log-analyzer"

          python3 -m venv "$VENV"
          "$VENV/bin/pip" install --quiet --upgrade pip
          "$VENV/bin/pip" install --quiet "$WHEEL"

          # CLI wrapper
          mkdir -p "$STAGING/usr/bin"
          cat > "$STAGING/usr/bin/log-analyzer" <<'EOF'
          #!/bin/sh
          exec /opt/log-analyzer/bin/python -m log_analyzer.cli "$@"
          EOF
          chmod +x "$STAGING/usr/bin/log-analyzer"

          # TUI binary
          cp target/release/la "$STAGING/usr/bin/la"

          # Generate nfpm config
          VERSION="${GITHUB_REF_NAME#v}"
          ARCH=$(uname -m)
          sed -e "s|__VERSION__|${VERSION}|g" \
              -e "s|__ARCH__|${ARCH}|g" \
              -e "s|__STAGING__|${STAGING}|g" \
              nfpm.yaml > "$STAGING/nfpm.yaml"

          mkdir -p dist
          nfpm pkg -f "$STAGING/nfpm.yaml" -p deb -t dist/
          nfpm pkg -f "$STAGING/nfpm.yaml" -p rpm -t dist/

          rm -rf "$STAGING"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            dist/*.deb
            dist/*.rpm

  # ── GitHub Release ──────────────────────────────────────────────
  github-release:
    name: Create Release
    needs:
      [build-linux-musl, build-linux-gnu, build-linux-gnu-legacy, build-macos-tui, build-windows-tui, build-wheels, build-linux-pkg]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact directory
        run: |
          mkdir -p release
          find artifacts -type f | while read f; do
            cp "$f" release/
          done
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: release/*
          generate_release_notes: true
